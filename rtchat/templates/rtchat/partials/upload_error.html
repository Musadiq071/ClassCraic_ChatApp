{% if form.errors %}
    <div class="text-red-500 text-sm space-y-1">
        {% for field in form %}
            {% for error in field.errors %}
                <div>{{ error }}</div>
            {% endfor %}
        {% endfor %}

        {% for error in form.non_field_errors %}
            <div>{{ error }}</div>
        {% endfor %}
    </div>
{% endif %}
