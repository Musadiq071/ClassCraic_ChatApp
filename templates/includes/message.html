{% if messages %}
<div class="fixed top-4 left-0 right-0 z-50 flex flex-col items-center gap-2 px-4 pointer-events-none">
    {% for message in messages %}
    <div
        x-data="{ showMessage: false }"
        x-cloak
        x-init="setTimeout(() => showMessage = true, 100); setTimeout(() => showMessage = false, 5000)"
        x-show="showMessage"
        x-transition:enter="duration-300 ease-out"
        x-transition:enter-start="opacity-0 -translate-y-4"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="duration-200 ease-in"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 -translate-y-4"
        class="w-full max-w-xl pointer-events-auto"
    >
        <div class="flex items-center py-3 pl-5 pr-4 rounded-lg text-white shadow-lg
            {% if message.tags == 'success' %} bg-green-500
            {% elif message.tags == 'error' %} bg-red-500
            {% elif message.tags == 'warning' %} bg-amber-500
            {% else %} bg-blue-500 {% endif %}">
            
            <div class="text-base font-medium">
                {{ message }}
            </div>

            <button type="button" class="ml-auto pl-4" @click="showMessage = false">
                <svg fill="white" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    viewBox="0 0 24 24" stroke="currentColor" class="w-6 h-6">
                    <path d="M6 18L18 6M6 6l12 12"></path>
                </svg>
            </button>
        </div>
    </div>
    {% endfor %}
</div>
{% endif %}
